services:
  api:
    build: .
    container_name: assessment-task-api-easy
    env_file:
      - .env
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./tasks.db}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
